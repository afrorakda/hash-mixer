<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parallel Timer</title>
    <link rel="apple-touch-icon" href="image_21.png">
    <link rel="icon" type="image/png" href="image_21.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333; /* 監督指定の黒 */
            --accent: #eee;
            --radius: 12px; /* 少し小さく */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* 一画面固定 */
            padding: 5px; /* 極限まで削る */
        }

        .fridge-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between; /* 均等配置 */
        }

        /* Timer Card (圧縮) */
        .timer-card {
            background: #fafafa;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 8px; /* 圧縮 */
            flex: 1; /* 親要素の高さを分け合う */
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .timer-card.running { border-color: var(--main); background: #fff; }
        .timer-card.alarm { animation: blink 0.5s infinite; border-color: var(--main); }

        @keyframes blink {
            0% { background-color: #fff; color: var(--main); }
            50% { background-color: var(--main); color: #fff; }
            100% { background-color: #fff; color: var(--main); }
        }

        .display {
            font-size: 3.5rem; /* 少し小さく */
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            text-align: center;
            margin-bottom: 5px;
            line-height: 1;
        }

        /* Controls (圧縮) */
        .adder-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 8px; }
        .add-btn {
            background: var(--accent); border: none; padding: 10px 0; /* 圧縮 */
            border-radius: 8px; font-size: 0.8rem; font-weight: 800; color: var(--main); cursor: pointer;
        }
        .add-btn:active { background: #ccc; }

        .action-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 8px; }
        .main-btn {
            background: var(--main); color: #fff; border: none; padding: 12px; /* 圧縮 */
            border-radius: 10px; font-size: 1rem; font-weight: 800; cursor: pointer;
        }
        .reset-btn {
            background: #fff; border: 2px solid var(--accent); color: #ccc;
            padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 0.7rem;
        }

        /* Footer (圧縮) */
        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0; }
        .kofi-btn, .home-btn {
            display: inline-flex; align-items: center; padding: 10px 18px; /* 圧縮 */
            border-radius: 12px; font-weight: bold; font-size: 0.8rem; text-decoration: none;
        }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); border: none; }

        footer { font-size: 0.7rem; color: #bbb; text-align: center; padding-bottom: 5px; }

        /* Modal (固定仕様:憲法遵守) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { 
            background: #fff; padding: 30px; border-radius: 20px; 
            max-width: 320px; width: 90%; position: relative;
            text-align: left;
        }
        .modal-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2rem; font-weight: 800;}
        .instruction-group { margin-bottom: 15px; font-size: 0.95rem; line-height: 1.5; color: #333; }
        .modal-cls-btn { background: var(--accent); border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 800; color: var(--main); cursor: pointer; margin-top: 10px;}
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; }

    </style>
</head>
<body>

<div class="fridge-container">
    <div class="timer-card" id="card-1">
        <div class="display" id="display-1">00:00</div>
        <div class="adder-grid">
            <button class="add-btn" onclick="addTime(1, 600)">+10m</button>
            <button class="add-btn" onclick="addTime(1, 300)">+5m</button>
            <button class="add-btn" onclick="addTime(1, 60) ">+1m</button>
            <button class="add-btn" onclick="addTime(1, 10) ">+10s</button>
        </div>
        <div class="action-grid">
            <button class="main-btn" id="start-1" onclick="toggleTimer(1)">START</button>
            <button class="reset-btn" onclick="resetTimer(1)">CLR</button>
        </div>
    </div>

    <div class="timer-card" id="card-2">
        <div class="display" id="display-2">00:00</div>
        <div class="adder-grid"><button class="add-btn" onclick="addTime(2, 600)">+10m</button><button class="add-btn" onclick="addTime(2, 300)">+5m</button><button class="add-btn" onclick="addTime(2, 60) ">+1m</button><button class="add-btn" onclick="addTime(2, 10) ">+10s</button></div>
        <div class="action-grid"><button class="main-btn" id="start-2" onclick="toggleTimer(2)">START</button><button class="reset-btn" onclick="resetTimer(2)">CLR</button></div>
    </div>

    <div class="timer-card" id="card-3">
        <div class="display" id="display-3">00:00</div>
        <div class="adder-grid"><button class="add-btn" onclick="addTime(3, 600)">+10m</button><button class="add-btn" onclick="addTime(3, 300)">+5m</button><button class="add-btn" onclick="addTime(3, 60) ">+1m</button><button class="add-btn" onclick="addTime(3, 10) ">+10s</button></div>
        <div class="action-grid"><button class="main-btn" id="start-3" onclick="toggleTimer(3)">START</button><button class="reset-btn" onclick="resetTimer(3)">CLR</button></div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">
            🍵 Support me on Ko-fi
        </a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" onclick="document.getElementById('modal').style.display='none'">&times;</span>
        <div class="modal-title-row">
            <span>📱</span>
            <strong>Install</strong>
        </div>
        
        <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">Add to your home screen.</p>

        <div class="instruction-group">
            <p>🍏 <strong>iPhone (Safari):</strong></p>
            <p>Tap <strong>Share</strong>, then <strong>Add to Home Screen</strong>.</p>
        </div>

        <div class="instruction-group">
            <p>🤖 <strong>Android (Chrome):</strong></p>
            <p>Tap <strong>Menu (⋮)</strong>, then <strong>Add to home screen</strong>.</p>
        </div>

        <button onclick="document.getElementById('modal').style.display='none'" class="modal-cls-btn">Close</button>
    </div>
</div>

<script>
    const timers = {
        1: { time: 0, interval: null, running: false, alarmInt: null },
        2: { time: 0, interval: null, running: false, alarmInt: null },
        3: { time: 0, interval: null, running: false, alarmInt: null }
    };

    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function beep() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime); // わずかに音量下げ
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
    }

    function addTime(id, sec) {
        initAudio();
        const t = timers[id];
        if (t.alarmInt) stopAlarm(id);
        t.time += sec;
        if (t.time > 5999) t.time = 5999;
        updateDisplay(id);
    }

    function updateDisplay(id) {
        const m = Math.floor(timers[id].time / 60);
        const s = timers[id].time % 60;
        document.getElementById(`display-${id}`).textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function toggleTimer(id) {
        initAudio();
        const t = timers[id];
        const btn = document.getElementById(`start-${id}`);
        const card = document.getElementById(`card-${id}`);

        if (t.alarmInt) {
            stopAlarm(id);
            return;
        }

        if (t.running) {
            clearInterval(t.interval);
            t.running = false;
            btn.textContent = 'RESUME';
            card.classList.remove('running');
        } else {
            if (t.time <= 0) return;
            t.running = true;
            btn.textContent = 'PAUSE';
            card.classList.add('running');
            
            t.interval = setInterval(() => {
                t.time--;
                updateDisplay(id);
                if (t.time <= 0) {
                    clearInterval(t.interval);
                    t.running = false;
                    btn.textContent = 'STOP';
                    card.classList.remove('running');
                    card.classList.add('alarm');
                    startAlarm(id);
                }
            }, 1000);
        }
    }

    function startAlarm(id) {
        let count = 0;
        beep(); // 即座に1回目の音を出す
        timers[id].alarmInt = setInterval(() => {
            beep();
            count++;
            if (count > 150) stopAlarm(id); // Approx 30s
        }, 200);
    }

    function stopAlarm(id) {
        const t = timers[id];
        clearInterval(t.alarmInt);
        t.alarmInt = null;
        document.getElementById(`card-${id}`).classList.remove('alarm');
        document.getElementById(`start-${id}`).textContent = 'START';
    }

    function resetTimer(id) {
        const t = timers[id];
        clearInterval(t.interval);
        if (t.alarmInt) stopAlarm(id);
        t.time = 0;
        t.running = false;
        updateDisplay(id);
        document.getElementById(`start-${id}`).textContent = 'START';
        document.getElementById(`card-${id}`).className = 'timer-card';
    }

    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
</script>

</body>
</html>
